<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/estilos.css">
    <title>Cotización</title>
</head>

<body>
    <header>
        <nav class=" navbar navbar-expand-sm bg-light navbar-light justify-content-center">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="servicios.html">Servicios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="cotizacion.html">Cotización</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="contacto.html">Contacto</a>
                </li>
            </ul>
        </nav>
    </header>
    </div>
    <main>
        <h4 class="titulo">¡Obtén una cotización personalizada para tu mascota!</h4>
        <h6 class="text-center">Al llenar el cuestionario la cotización llegará a tu correo electrónico.</h6>
        <section>
            <form class="container mt-3">
                <div class="mb-3">
                    <label>Nombre de tu mascota:</label>
                    <input type="text" class="form-control" name="nombre" placeholder="Ingresa el nombre de tu mascota"
                        required>
                </div>
                <div class="mb-3">
                    <label>Fecha de nacimiento</label>
                    <input type="date" class="form-control" name="fecha_nacimiento" required>
                </div>
                <div class="mb-3">
                    <label>Especie:</label>
                    <select class="form-select" name="especie" required>
                        <option value="">Selecciona la especie de tu mascota</option>
                        <option value="perro">Perro</option>
                        <option value="gato">Gato</option>
                        <option value="ave">Ave</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Seleccione su sexo :</label>
                    <input type="radio" name="sexo" value="macho" required> Macho
                    <input type="radio" name="sexo" value="hembra" required> Hembra
                </div>
                <div class="mb-3">
                    <label>Sintomas de su mascota:</label>
                    <textarea class="form-control" name="datos_extra"
                        placeholder="Incluya cualquier dato extra de su mascota como alergías o condiciones de salud"
                        required></textarea>
                </div>
                <div class="mb-3">
                    <label>Tu correo electrónico:</label>
                    <input type="email" class="form-control" name="email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="mb-3">
                    <label>Tu número de teléfono:</label>
                    <input type="number" class="form-control" name="telefono" placeholder="912345678" required>
                </div>
                <button type="submit" class="btn-veterinaria">Enviar Cotización</button>
            </form>
        </section>
    </main>
    <footer class="contenedor">
        <p>Aylin Carrera Soto
            <a href="https://github.com/AylinCarrera">Mi GitHub</a>
        </p>
    </footer>
</body>

</html>
