<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <title>Contacto</title>
</head>

<body>
    <header>
        <img src="img/logo.png" width="auto" height="200px">
        <h2 class="text-center">Formulario de Contacto</h2>
        <div class="container mt-1">
            <ul class="text-center">
                <a href="index.html">Inicio</a>

                <a href="servicios.html">Servicios</a>

                <a href="cotizacion.html">Cotiza con nosotros</a>

                <a href="contacto.html">Contacto</a>
            </ul>
            <h6 class="text-center">Si tienes alguna pregunta o necesitas más información ingresa tus datos. ¡Nos
                pondremos en contacto contigo lo antes posible!</h6>
        </div>
    </header>
    <main class="contenedor">
        <section>
            <form class="container mt-3">
                <div class="mb-3">
                    <label>Tu nombre:</label>
                    <input type="text" class="form-control" name="nombre" placeholder="Ingresa tu nombre completo"
                        required>
                </div>
                <div class="mb-3">
                    <label>Tu correo electrónico:</label>
                    <input type="email" class="form-control" name="email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="mb-3">
                    <label>Mensaje:</label>
                    <textarea class="form-control" name="mensaje"
                        placeholder="Escribe tu disponibilidad horaria para contactarte" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Enviar</button>
            </form>
        </section>
    </main>
    <footer class="text-center mt-5">
        <p>Aylin Carrera Soto
            <a href="https://github.com/AylinCarrera">Mi GitHub</a>
        </p>
    </footer>
</body>

</html>
