<body>
    <header>
        <nav class=" navbar navbar-expand-sm bg-light navbar-light justify-content-center">
            <ul class="navbar-nav">
                <li class="nav-item">

                </li>
            </ul>
        </nav>
    </header>
    <main>
        <h4 class="titulo">¡Nos contactamos contigo!</h4>
        <h6 class="text-center">ingresa tus datos para contactarte</h6>
        <section>
            <form class="container mt-3">
                <div class="mb-3">
                    <label>Tu nombre:</label>
                    <input type="text" class="form-control" name="nombre" placeholder="Ingresa tu nombre completo"
                        required>
                </div>
                <div class="mb-3">
                    <label>Tu correo electrónico:</label>
                    <input type="email" class="form-control" name="email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="mb-3">
                    <label>Mensaje:</label>
                    <textarea class="form-control" name="mensaje"
                        placeholder="Escribe tu disponibilidad horaria para contactarte" required></textarea>
                </div>
                <button type="submit" class="btn-veterinaria">Enviar</button>
            </form>
        </section>
    </main>
    <footer class="contenedor">
        <p>Aylin Carrera Soto
            <a href="https://github.com/AylinCarrera">Mi GitHub</a>
        </p>
